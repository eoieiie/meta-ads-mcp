name: Meta Ads Report

on:
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch:
    inputs:
      since:
        description: "Optional start date YYYY-MM-DD"
        required: false
        type: string
      until:
        description: "Optional end date YYYY-MM-DD"
        required: false
        type: string
      dry_run:
        description: "Build Slack payload without sending"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_GRAPH_VERSION: ${{ vars.META_GRAPH_VERSION || 'v25.0' }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_BEST_ADSET_ID: ${{ secrets.META_BEST_ADSET_ID }}
      META_NEW_ADSET_ID: ${{ secrets.META_NEW_ADSET_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in META_ACCESS_TOKEN META_AD_ACCOUNT_ID META_BEST_ADSET_ID META_NEW_ADSET_ID SLACK_WEBHOOK_URL; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [[ "$missing" == "1" ]]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Send Slack report
        shell: bash
        run: |
          args=(--slack)
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            args+=(--scheduled)
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ -n "${{ inputs.since }}" && -n "${{ inputs.until }}" ]]; then
            args+=(--since "${{ inputs.since }}" --until "${{ inputs.until }}")
          fi
          node build/scripts/review.js "${args[@]}"

      - name: Commit state snapshot
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Meta Ads snapshot"
          file_pattern: data/state.json
